<h2 mat-dialog-title>➕ Añadir nuevo paquete</h2>
<mat-dialog-content>
  <div class="campo">
    <label>Nombre *</label>
    <input type="text" 
           [(ngModel)]="nombre"
           (input)="validarNombre()"
           (blur)="validarNombre()"
           placeholder="Ej: Paraíso Caribeño" />
    <small class="error" *ngIf="errorNombre">{{ errorNombre }}</small>
  </div>

  <div class="campo">
    <label>Destino *</label>
    <input type="text" 
           [(ngModel)]="destino"
           (input)="validarDestino()"
           (blur)="validarDestino()"
           placeholder="Ej: Punta Cana, República Dominicana" />
    <small class="error" *ngIf="errorDestino">{{ errorDestino }}</small>
  </div>

  <div class="campo">
  <label>Descripción *</label>
  <textarea [(ngModel)]="descripcion" 
            rows="3" 
            placeholder="Descripción del paquete"
            (input)="validarDescripcion()"
            (blur)="validarDescripcion()"></textarea>
  <small class="error" *ngIf="errorDescripcion">{{ errorDescripcion }}</small>
</div>

  <div class="campo">
    <label>Precio (€) *</label>
    <input type="number" 
           [(ngModel)]="precio" 
           step="0.01" 
           min="0"
           (input)="validarPrecio()"
           (blur)="validarPrecio()" />
    <small class="error" *ngIf="errorPrecio">{{ errorPrecio }}</small>
  </div>

  <div class="campo">
    <label>Duración (días) *</label>
    <input type="number" 
           [(ngModel)]="duracionDias" 
           min="1"
           (input)="validarDuracion()"
           (blur)="validarDuracion()" />
    <small class="error" *ngIf="errorDuracion">{{ errorDuracion }}</small>
  </div>

  <div class="campo">
    <label>Plazas disponibles *</label>
    <input type="number" 
           [(ngModel)]="plazasDisponibles" 
           min="1"
           (input)="validarPlazas()"
           (blur)="validarPlazas()" />
    <small class="error" *ngIf="errorPlazas">{{ errorPlazas }}</small>
  </div>

  <div class="campo">
    <label>URL imagen (opcional)</label>
    <input type="text" [(ngModel)]="urlImagen" placeholder="https://..." />
  </div>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" 
        (click)="guardar()"
        [disabled]="!nombre.trim() || !destino.trim() || !descripcion.trim() || descripcion.trim().length < 10 || !precio || precio <= 0 || !duracionDias || duracionDias < 1 || !plazasDisponibles || plazasDisponibles < 1">
  Guardar
</button>
</mat-dialog-actions>
